# Bogart Linux - Package Dependency Map
# Format: package: dependent1 dependent2 ...
# Read as: "if package is updated/rebuilt, these dependents must be rebuilt too"
# Used by: update-checkv2 cascade resolver
# Generated: April 2026
#
# NOTE: Header-only libs (glm, tomlplusplus, glaze, nlohmann-json, simde,
#       websocketpp) have no ABI — omitted intentionally.
# NOTE: Stable Xorg/X11 libs (libx11, libxcb, libxrender, etc.) are tracked
#       by update-check but excluded here — soname bumps are extremely rare.
#       Add manually if one ever causes a cascade.

# ============================================================
# HYPRLAND ECOSYSTEM
# ============================================================
hyprutils:          hyprlang hyprwayland-scanner hyprcursor hyprgraphics aquamarine hyprwire hyprlock
hyprlang:           hyprland hyprpaper hyprlock
hyprcursor:         hyprland
hyprgraphics:       hyprland hyprpaper
aquamarine:         hyprland
hyprland:           hyprland-guiutils hyprtoolkit
