graphite2:          harfbuzz
libpng:             harfbuzz cairo gdk-pixbuf imagemagick
icu:                harfbuzz libxml2
harfbuzz:           cairo pango
fribidi:            pango
fontconfig:         pango
pixman:             cairo
cairo:              pango librsvg gtk4 gtk4-layer-shell rofi-wayland
pango:              gtk4 gtk4-layer-shell ironbar rofi-wayland
graphene:           gtk4
libepoxy:           gtk3 gtk4
libjpeg-turbo:      gdk-pixbuf imagemagick
libwebp:            gdk-pixbuf imagemagick
gdk-pixbuf:         gtk4 gtk3 librsvg
gobject-introspection: gtk4 pygobject
at-spi2-core:       gtk4 gtk3
pcre2:              glib
glib:               at-spi2-core glib-networking json-glib gtk3 gtk4
gtk4:               gtk4-layer-shell ironbar
gtk4-layer-shell:   ironbar
gtk3:               zathura girara yad waypaper

