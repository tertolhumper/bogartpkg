# ============================================================
# TOOLCHAIN — SPECIAL: __WARN_TOOLCHAIN__
# These are not cascade maps — they invalidate every binary on
# the system. The tool should emit a FULL REBUILD WARNING and
# stop attempting to list dependents.
# ============================================================
glibc:              __WARN_TOOLCHAIN__
gcc:                __WARN_TOOLCHAIN__
binutils:           __WARN_TOOLCHAIN__

# ============================================================
# LFS BASE — RUNTIME LIBRARIES
# These packages are skipped by update-check (stable/infrequent)
# but their shared libs are linked by many tracked packages.
# Listed here so manual upgrades trigger correct cascade warnings.
# ============================================================

# zlib: compression used by almost everything
zlib:               curl libpng libxml2 brotli mesa ffmpeg flatpak libarchive btrfs-progs openssh python

# openssl: TLS used widely — gnutls/nettle are separate but curl/openssh/python use openssl directly
openssl:            curl openssh python flatpak

# ncurses: terminal UI lib
ncurses:            vim readline python bash

# readline: interactive input
readline:           bash python gdb

# libffi: foreign function interface — used by GObject/Python binding layer
libffi:             python glib gobject-introspection

# sqlite: embedded database
sqlite:             python glib flatpak

# expat: XML parser
expat:              python dbus

# dbus: IPC bus — desktop stack depends heavily on it
dbus:               at-spi2-core glib systemd flatpak pipewire

# util-linux runtime libs (libmount, libblkid, libuuid)
# these are separate .so files from the util-linux package
util-linux:         systemd libostree glib flatpak btrfs-progs

# linux-pam: auth framework
linux-pam:          openssh sudo systemd

# libcap: POSIX capabilities
libcap:             systemd bubblewrap flatpak

# kmod: kernel module library (libkmod)
kmod:               systemd

# e2fsprogs: provides libcom_err and libext2fs
e2fsprogs:          openssh

# bzip2: compression — libbz2
bzip2:              python libarchive ffmpeg

# xz/liblzma: lzma compression
xz:                 systemd libarchive python

# lz4: fast compression (liblz4)
lz4:                systemd zstd

# zstd: fast compression (libzstd)
zstd:               systemd btrfs-progs ffmpeg libarchive

# libpipeline: pipeline manipulation
libpipeline:        man-db

# shadow: provides libsubid
shadow:             bubblewrap flatpak

# ============================================================
# CUSTOM PACKAGES — as dependents (additions to above entries)
# These need to appear here since they are omitted from the
# entries above to keep those sections readable.
# ============================================================

# NOTE: nv-codec-headers is header-only (build dep for ffmpeg only)
#       no runtime ABI — intentionally omitted
# NOTE: udis86, agg, ps_mem, porg, xorriso have no significant
#       downstream tracked dependents
libxi:              at-spi2-core firefox gst-plugins-base gtk gtk4 libxinerama libxtst
