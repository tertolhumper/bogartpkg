PKG_NAME="meson"
PKG_VER="1.11.1"
PKG_URL1="https://github.com/mesonbuild/meson/releases/download/${PKG_VER}/meson-${PKG_VER}.tar.gz"
PKG_URL2=""
PKG_URL3=""
PKG_BUILD_TYPE="custom"
PKG_PRE_BUILD="rm -rf /root/.cache/pip/wheels/* /sources/meson-${PKG_VER}/build /sources/meson-${PKG_VER}/meson.egg-info"
PKG_CUSTOM_BUILD="pip3 wheel -w dist --no-cache-dir --no-build-isolation --no-deps \$PWD"
PKG_CUSTOM_INSTALL="pip3 install --no-index --find-links dist --force-reinstall --no-deps meson && install -vDm644 data/shell-completions/bash/meson /usr/share/bash-completion/completions/meson && install -vDm644 data/shell-completions/zsh/_meson /usr/share/zsh/site-functions/_meson"
