PKG_NAME="ncurses"
PKG_VER="6.6"
PKG_URL1="https://invisible-mirror.net/archives/ncurses/ncurses-${PKG_VER}.tar.gz"
PKG_URL2=""
PKG_URL3=""
PKG_BUILD_TYPE="custom"
PKG_CUSTOM_BUILD="./configure --prefix=/usr --mandir=/usr/share/man --with-shared --without-debug --without-normal --with-cxx-shared --enable-pc-files --with-pkg-config-libdir=/usr/lib/pkgconfig && make"
PKG_CUSTOM_INSTALL="make DESTDIR=\$PWD/dest install && sed -e 's/^#if.*XOPEN.*\$/#if 1/' -i dest/usr/include/curses.h && cp --remove-destination -av dest/* / && for lib in ncurses form panel menu; do ln -sfv lib\${lib}w.so /usr/lib/lib\${lib}.so; ln -sfv \${lib}w.pc /usr/lib/pkgconfig/\${lib}.pc; done && ln -sfv libncursesw.so /usr/lib/libcurses.so"
