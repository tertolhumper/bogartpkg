PKG_NAME="x265"
PKG_VER="4.2"
PKG_URL1="https://bitbucket.org/multicoreware/x265_git/downloads/x265_${PKG_VER}.tar.gz"
PKG_URL2=""
PKG_URL3=""
PKG_BUILD_TYPE="custom"
PKG_TARBALL="x265_${PKG_VER}.tar.gz"
PKG_PRE_BUILD="sed -r '/cmake_policy.*(0025|0054)/d' -i source/CMakeLists.txt && rm -rf /usr/lib/libx265* /usr/include/x265*.h /usr/lib/pkgconfig/x265.pc"
PKG_CUSTOM_BUILD="cmake -B bld source -DCMAKE_INSTALL_PREFIX=/usr -DGIT_ARCHETYPE=1 -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -Wno-dev && cmake --build bld --parallel $(nproc)"
PKG_CUSTOM_INSTALL="cmake --install bld && rm -vf /usr/lib/libx265.a"
