PKG_NAME="perl"
PKG_VER="5.42.2"
PKG_URL1="https://www.cpan.org/src/5.0/perl-${PKG_VER}.tar.xz"
PKG_URL2=""
PKG_URL3=""
PKG_BUILD_TYPE="custom"
PKG_PRE_BUILD="export BUILD_ZLIB=False && export BUILD_BZIP2=0"
PKG_CUSTOM_BUILD="sh Configure -des \
  -D prefix=/usr \
  -D vendorprefix=/usr \
  -D privlib=/usr/lib/perl5/5.42/core_perl \
  -D archlib=/usr/lib/perl5/5.42/core_perl \
  -D sitelib=/usr/lib/perl5/5.42/site_perl \
  -D sitearch=/usr/lib/perl5/5.42/site_perl \
  -D vendorlib=/usr/lib/perl5/5.42/vendor_perl \
  -D vendorarch=/usr/lib/perl5/5.42/vendor_perl \
  -D man1dir=/usr/share/man/man1 \
  -D man3dir=/usr/share/man/man3 \
  -D pager='/usr/bin/less -isR' \
  -D useshrplib \
  -D usethreads && make"
PKG_CUSTOM_INSTALL="make install && unset BUILD_ZLIB BUILD_BZIP2"
