# /etc/bogartpkg/packages.d/gstreamer.conf
PKG_NAME="gstreamer"
PKG_VER="1.28.4"
PKG_URL1="https://gstreamer.freedesktop.org/src/gstreamer/gstreamer-${PKG_VER}.tar.xz"
PKG_URL2="https://mirrors.kernel.org/gentoo/distfiles/gstreamer-${PKG_VER}.tar.xz"
PKG_URL3=""
PKG_MESON_OPTS="-Dintrospection=disabled"
PKG_POST_INSTALL="
    # Second pass: rebuild with introspection enabled
    cd /var/tmp/bogartpkg/gstreamer-${PKG_VER}
    meson setup build --reconfigure --prefix=/usr --buildtype=release -Dintrospection=enabled
    ninja -C build -j\$(nproc)
    ninja -C build install
"
PKG_SHA256="f5adc7e8f448c10260b3b25aa101c9d540674c8d9a54c2b77a86d04f2b3b50dd"
