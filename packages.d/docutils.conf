PKG_NAME="docutils"
PKG_VER="0.23"
PKG_URL1="https://pypi.org/packages/source/d/docutils/docutils-${PKG_VER}.tar.gz"
PKG_BUILD_TYPE="custom"
PKG_DIR="docutils-${PKG_VER}"
PKG_CUSTOM_BUILD="pip3 wheel -w dist --no-cache-dir --no-build-isolation --no-deps \$PWD"
PKG_CUSTOM_INSTALL="pip3 install --no-index --find-links dist --force-reinstall --no-deps docutils"
