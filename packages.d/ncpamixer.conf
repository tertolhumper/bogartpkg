PKG_NAME="ncpamixer"
PKG_VER="1.3.11"
PKG_URL1="https://github.com/fulhax/ncpamixer/archive/refs/tags/${PKG_VER}.tar.gz"
PKG_TARBALL="ncpamixer-${PKG_VER}.tar.gz"
PKG_BUILD_TYPE="custom"
PKG_CUSTOM_BUILD="cmake -S src -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr && cmake --build build -j$(nproc)"
PKG_CUSTOM_INSTALL="install -Dm755 build/ncpamixer /usr/bin/ncpamixer"
